<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>현관·중문 시공 요청서</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #ffffff;
    }

    body {
      display: grid;
      justify-items: center;
      gap: 0;
      padding: 0;
    }

    img {
      display: block;
      width: min(100vw, 980px);
      height: auto;
    }

    @media print {
      @page {
        size: A4;
        margin: 0;
      }

      body {
        display: block;
      }

      img {
        width: 100%;
        max-height: 100vh;
        object-fit: contain;
        page-break-after: always;
      }

      img:last-child {
        page-break-after: auto;
      }
    }
  </style>
</head>
