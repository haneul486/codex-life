    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #f4f4f4;
      color: #111;
    }

    main {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      padding: 12px;
    }

    figure {
      margin: 0;
      padding: 8px;
      background: #fff;
      border: 1px solid #ddd;
    }

    img {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
    }

    figcaption {
      padding-top: 6px;
      font-weight: 700;
    }
  </style>
</head>
