<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>동아 인테리어 예산표</title>
  <style>
    :root {
      --bg: #f3f5f7;
      --panel: #ffffff;
      --line: #dde4ea;
      --ink: #18212b;
      --muted: #66768a;
      --navy: #314355;
      --blue: #4d6379;
      --clay: #af644d;
      --green: #1f7a5a;
      --shadow: 0 14px 34px rgba(24, 33, 43, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
      line-height: 1.5;
    }

    .page {
      width: min(1160px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 40px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: end;
      padding: 24px 28px;
      border-radius: 8px;
      background: linear-gradient(135deg, #23303c, var(--navy));
      color: #fff;
      box-shadow: var(--shadow);
    }

    h1, h2, p { margin: 0; }

    h1 {
      font-size: clamp(28px, 3.5vw, 38px);
      line-height: 1.1;
      font-weight: 900;
    }

    .meta {
      display: grid;
      gap: 8px;
      justify-items: end;
      color: rgba(255, 255, 255, 0.82);
      font-size: 13px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.14);
      font-weight: 800;
    }

    section { margin-top: 20px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 162px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px 18px;
      box-shadow: 0 8px 22px rgba(24, 33, 43, 0.05);
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 4px;
      background: var(--navy);
    }

    .accent-blue::before { background: var(--blue); }
    .accent-clay::before { background: var(--clay); }

    .metric-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .metric {
      margin-top: 10px;
      font-size: clamp(24px, 2.8vw, 32px);
      font-weight: 900;
      line-height: 1.12;
      font-variant-numeric: tabular-nums;
    }

    .metric small {
      display: inline-block;
      margin-left: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .metric-sub {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.45;
      font-variant-numeric: tabular-nums;
    }

    .split {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      align-items: start;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: end;
      margin-bottom: 10px;
      padding: 0 2px;
    }

    h2 {
      font-size: 21px;
      font-weight: 900;
    }

    .note {
      color: var(--muted);
      font-size: 13px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 8px 22px rgba(24, 33, 43, 0.05);
    }

    th, td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      vertical-align: middle;
      font-size: 14px;
    }

    th {
      background: #ecf1f5;
      color: #344355;
      text-align: left;
      font-size: 13px;
      font-weight: 900;
    }

    tr:last-child td { border-bottom: 0; }

    .money, th.money {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .total-row td {
      background: #f4f7f9;
      font-weight: 900;
    }

    .category-row td {
      background: #f4f7f9;
      color: var(--navy);
      font-weight: 900;
    }

    .item-name {
      font-weight: 800;
    }

    .paid-item {
      color: var(--green);
    }

    .done-badge {
      display: inline-flex;
      align-items: center;
      margin-left: 8px;
      padding: 2px 7px;
      border-radius: 999px;
      background: #edf8f2;
      color: var(--green);
      border: 1px solid #cfe8da;
      font-size: 11px;
      font-weight: 800;
      vertical-align: middle;
    }

    input[type="number"],
    input[type="date"],
    input[type="text"],
    select {
      width: 100%;
      padding: 8px 9px;
      border: 1px solid #cbd6e2;
      border-radius: 6px;
      background: #fbfdff;
      color: var(--ink);
      font: inherit;
    }

    input[type="number"] {
      text-align: right;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    select {
      min-width: 120px;
      width: max(100%, 120px);
    }

    input[type="date"].is-empty::-webkit-datetime-edit {
      color: transparent;
    }

    input[type="date"]:focus::-webkit-datetime-edit,
    input[type="date"]:valid::-webkit-datetime-edit,
    input[type="date"]:not(.is-empty)::-webkit-datetime-edit {
      color: var(--ink);
    }

    .controls {
      display: flex;
      justify-content: flex-end;
      margin: 10px 0 14px;
    }

    button {
      border: 1px solid rgba(49, 67, 85, 0.2);
      background: var(--navy);
      color: #fff;
      border-radius: 8px;
      padding: 10px 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .purchase-table td:nth-child(1) { width: 86px; }
    .purchase-table td:nth-child(4),
    .purchase-table td:nth-child(5) { width: 124px; }
    .purchase-table td:nth-child(6) { width: 120px; }
    .purchase-table td:nth-child(7) { width: 130px; }
    .purchase-table td:nth-child(8) { width: 150px; }

    .payment-table td:nth-child(1) { width: 110px; }
    .payment-table td:nth-child(2) { width: 128px; }
    .payment-table td:nth-child(3) { width: 120px; }
    .payment-table td:nth-child(5) { width: 120px; }

    body.printing-mode .detail-section {
      display: none;
    }

    @media (max-width: 960px) {
      header { grid-template-columns: 1fr; }
      .meta { justify-items: start; }
      .grid { grid-template-columns: 1fr; }
      table { display: block; overflow-x: auto; white-space: nowrap; }
    }

    @media (max-width: 560px) {
      .page { width: min(100% - 20px, 1160px); padding-top: 16px; }
      .section-head { display: block; }
      .note { margin-top: 6px; }
    }

    @page {
      size: A4;
      margin: 10mm;
    }

    @media print {
      html, body { width: 210mm; background: #fff; }
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; font-size: 10px; }
      .page { width: 190mm; padding: 0; }
      header, .card, table { box-shadow: none; }
      .detail-section, .controls, button { display: none; }
      .grid { gap: 6px; }
      .card { padding: 10px; min-height: 110px; }
      .metric { font-size: 20px; }
      .metric-sub { font-size: 9px; }
      th, td { padding: 5px 6px; font-size: 9px; }
      input, select { border: 0; background: transparent; padding: 1px 2px; font-size: 9px; }
      table { display: table; white-space: normal; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <div>
        <h1>동아 인테리어 예산표</h1>
      </div>
      <div class="meta">
        <span class="pill">기준일 2026-04-27</span>
      </div>
    </header>

    <section class="grid" aria-label="요약">
      <article class="card">
        <div class="metric-label">공사비</div>
        <div class="metric" id="constructionMetric"></div>
        <div class="metric-sub" id="constructionSub"></div>
      </article>
      <article class="card accent-blue">
        <div class="metric-label">생활 준비 비용</div>
        <div class="metric" id="livingMetric"></div>
        <div class="metric-sub" id="livingSub"></div>
      </article>
      <article class="card accent-clay">
        <div class="metric-label">전체 비용</div>
        <div class="metric" id="grandMetric"></div>
        <div class="metric-sub" id="grandSub"></div>
      </article>
    </section>

    <section class="split">
      <div>
        <div class="section-head">
          <h2>공사비 지급 현황</h2>
          <p class="note">계약금, 중도금, 잔금 기준</p>
        </div>
        <table class="payment-table">
          <thead>
            <tr>
              <th>구분</th>
              <th>지급일</th>
              <th class="money">금액(만원)</th>
              <th>지급 경로</th>
              <th>상태</th>
            </tr>
          </thead>
          <tbody id="constructionTableBody"></tbody>
        </table>
      </div>
    </section>

    <section>
      <div class="section-head">
        <h2>구매 상태 요약</h2>
        <p class="note">예상 금액이 있는 항목과 구매완료 항목을 함께 봅니다.</p>
      </div>
      <table class="summary-table">
        <thead>
          <tr>
            <th>항목</th>
            <th class="money">금액</th>
            <th>항목</th>
            <th class="money">금액</th>
          </tr>
        </thead>
        <tbody id="pricedItemsSummary"></tbody>
      </table>
    </section>

    <section class="detail-section">
      <div class="section-head">
        <h2>구매 필요항목</h2>
        <p class="note">구매일, 결제 경로, 실결제금액 기록</p>
      </div>
      <div class="controls">
        <button type="button" id="printButton">인쇄</button>
      </div>
      <table class="purchase-table">
        <thead>
          <tr>
            <th>분류</th>
            <th>항목</th>
            <th>메모</th>
            <th class="money">예상(만원)</th>
            <th class="money">실결제(원)</th>
            <th>상태</th>
            <th>구매일</th>
            <th>결제 경로</th>
          </tr>
        </thead>
        <tbody id="purchaseTableBody"></tbody>
      </table>
    </section>
  </main>

  <script>
    const fmt = new Intl.NumberFormat("ko-KR");

    function formatCompactWon(krw) {
      const man = Math.round(krw / 10000);
      if (man >= 10000) {
        const eok = Math.floor(man / 10000);
        const rest = man % 10000;
        return rest ? `${eok}억 ${fmt.format(rest)}만원` : `${eok}억원`;
      }
      return `${fmt.format(man)}만원`;
    }

    function formatWon(krw) {
      return `${fmt.format(krw)}원`;
    }

    function renderConstructionTable() {
      const tbody = document.getElementById("constructionTableBody");
      const rows = constructionData.map((item) => `
        <tr data-id="${item.id}">
          <td>${item.label}</td>
          <td><input type="date" data-field="date" value="${item.date}"></td>
          <td class="money"><input type="number" data-field="amountManwon" value="${item.amountManwon}"></td>
          <td><input type="text" data-field="route" value="${item.route}"></td>
          <td>
            <select class="payment-status" data-field="status">
              <option value="paid" ${item.status === "paid" ? "selected" : ""}>지급완료</option>
              <option value="planned" ${item.status === "planned" ? "selected" : ""}>예정</option>
            </select>
          </td>
        </tr>
      `).join("");

      tbody.innerHTML = rows + `
        <tr class="total-row">
          <td colspan="2">공사비 합계</td>
          <td class="money" id="constructionTotalText"></td>
          <td colspan="2"></td>
        </tr>
      `;
    }

    function renderPurchaseTable() {
      const tbody = document.getElementById("purchaseTableBody");
      const rows = purchaseData.map((item) => `
        <tr data-id="${item.id}">
          <td>${item.category}</td>
          <td>${item.item}</td>
          <td>${item.memo}</td>
          <td class="money"><input type="number" data-field="expectedManwon" value="${item.expectedManwon}"></td>
          <td class="money"><input type="number" data-field="actualWon" value="${item.actualWon}"></td>
          <td>
            <select class="purchase-status" data-field="status">
              <option value="planned" ${item.status === "planned" ? "selected" : ""}>구매예정</option>
              <option value="purchased" ${item.status === "purchased" ? "selected" : ""}>구매완료</option>
              <option value="skip" ${item.status === "skip" ? "selected" : ""}>보류</option>
            </select>
          </td>
          <td><input type="date" data-field="purchaseDate" value="${item.purchaseDate}"></td>
          <td><input type="text" data-field="paymentRoute" value="${item.paymentRoute}"></td>
        </tr>
      `).join("");

      tbody.innerHTML = rows + `
        <tr class="total-row">
          <td colspan="3">구매 예상 총액</td>
          <td class="money" id="purchaseExpectedText"></td>
          <td class="money" id="purchaseActualText"></td>
          <td colspan="3"></td>
        </tr>
      `;
    }

    function updatePurchaseSummary() {
      const summary = document.getElementById("pricedItemsSummary");
      const rows = purchaseData.filter((row) => row.expectedManwon > 0 || row.actualWon > 0);

      if (!rows.length) {
        summary.innerHTML = `<tr><td colspan="4" class="note">표시할 항목이 없습니다.</td></tr>`;
        return;
      }

      const categories = [...new Set(rows.filter((row) => row.expectedManwon > 0).map((row) => row.category))];
      const html = [];

      categories.forEach((category) => {
        const items = rows.filter((row) => row.category === category && row.expectedManwon > 0);
        const subtotal = items.reduce((sum, row) => {
          const expectedWon = row.expectedManwon * 10000;
          return sum + (row.status === "purchased" && row.actualWon > 0 ? row.actualWon : expectedWon);
        }, 0);

        html.push(`
          <tr class="category-row">
            <td colspan="3">${category}</td>
            <td class="money">${formatWon(subtotal)}</td>
          </tr>
        `);

        for (let i = 0; i < items.length; i += 2) {
          const left = items[i];
          const right = items[i + 1];
          const leftExpectedWon = left.expectedManwon * 10000;
          const leftAmount = left.status === "purchased" && left.actualWon > 0 ? left.actualWon : leftExpectedWon;
          const leftClass = left.status === "purchased" ? "item-name paid-item" : "item-name";
          const leftLabel = left.status === "purchased" ? `<span class="done-badge">구매완료</span>` : "";

          let rightCell = "<td></td><td class='money'></td>";
          if (right) {
            const rightExpectedWon = right.expectedManwon * 10000;
            const rightAmount = right.status === "purchased" && right.actualWon > 0 ? right.actualWon : rightExpectedWon;
            const rightClass = right.status === "purchased" ? "item-name paid-item" : "item-name";
            const rightLabel = right.status === "purchased" ? `<span class="done-badge">구매완료</span>` : "";
            rightCell = `<td><span class="${rightClass}">${right.item}</span>${rightLabel}</td><td class="money">${formatWon(rightAmount)}</td>`;
          }

          html.push(`
            <tr>
              <td><span class="${leftClass}">${left.item}</span>${leftLabel}</td>
              <td class="money">${formatWon(leftAmount)}</td>
              ${rightCell}
            </tr>
          `);
        }
      });

      summary.innerHTML = html.join("");
    }

    function updateDateInputs() {
      document.querySelectorAll('input[type="date"]').forEach((el) => {
        el.classList.toggle("is-empty", !el.value);
      });
    }

    function updateTotals() {
      const constructionTotal = constructionData.reduce((sum, row) => sum + row.amountManwon * 10000, 0);
      const constructionPaid = constructionData
        .filter((row) => row.status === "paid")
        .reduce((sum, row) => sum + row.amountManwon * 10000, 0);
      const constructionPlanned = constructionData
        .filter((row) => row.status !== "paid")
        .reduce((sum, row) => sum + row.amountManwon * 10000, 0);

      const purchasedTotal = purchaseData
        .filter((row) => row.status === "purchased")
        .reduce((sum, row) => sum + (row.actualWon > 0 ? row.actualWon : row.expectedManwon * 10000), 0);
      const plannedTotal = purchaseData
        .filter((row) => row.status === "planned")
        .reduce((sum, row) => sum + row.expectedManwon * 10000, 0);

      const livingTotal = purchasedTotal + plannedTotal;
      const grandTotal = constructionTotal + livingTotal;

      document.getElementById("constructionMetric").innerHTML = `${formatCompactWon(constructionTotal)} <small>${formatWon(constructionTotal)}</small>`;
      document.getElementById("constructionSub").textContent = `지출 ${formatWon(constructionPaid)} / 남은 금액 ${formatWon(constructionPlanned)}`;

      document.getElementById("livingMetric").innerHTML = `${formatCompactWon(livingTotal)} <small>${formatWon(livingTotal)}</small>`;
      document.getElementById("livingSub").textContent = `예정 ${formatWon(plannedTotal)} / 지출 ${formatWon(purchasedTotal)}`;

      document.getElementById("grandMetric").innerHTML = `${formatCompactWon(grandTotal)} <small>${formatWon(grandTotal)}</small>`;
      document.getElementById("grandSub").textContent = `공사비 ${formatWon(constructionTotal)} / 생활 준비 비용 ${formatWon(livingTotal)}`;

      document.getElementById("constructionTotalText").textContent = formatWon(constructionTotal);
      document.getElementById("purchaseExpectedText").textContent = `${formatCompactWon(livingTotal)} (${formatWon(livingTotal)})`;
      document.getElementById("purchaseActualText").textContent = formatWon(purchasedTotal);

      updateDateInputs();
      updatePurchaseSummary();
    }

    function syncConstructionField(id, field, rawValue) {
      const target = constructionData.find((item) => item.id === id);
      if (!target) return;

      if (field === "amountManwon") {
        target[field] = Number(rawValue) || 0;
        return;
      }

      target[field] = rawValue;
    }

    function syncPurchaseField(id, field, rawValue) {
      const target = purchaseData.find((item) => item.id === id);
      if (!target) return;

      if (field === "expectedManwon" || field === "actualWon") {
        target[field] = Number(rawValue) || 0;
        return;
      }

      target[field] = rawValue;
    }

    function handlePrint() {
      document.body.classList.add("printing-mode");
      window.print();
    }

    document.addEventListener("input", (event) => {
      const input = event.target;
      if (!(input instanceof HTMLInputElement || input instanceof HTMLSelectElement)) return;

      const row = input.closest("tr[data-id]");
      if (!row) return;

      const field = input.dataset.field;
      if (!field) return;

      if (row.closest("#constructionTableBody")) {
        syncConstructionField(row.dataset.id, field, input.value);
      }

      if (row.closest("#purchaseTableBody")) {
        syncPurchaseField(row.dataset.id, field, input.value);
      }

      updateTotals();
    });

    document.addEventListener("change", (event) => {
      const input = event.target;
      if (!(input instanceof HTMLInputElement || input instanceof HTMLSelectElement)) return;

      const row = input.closest("tr[data-id]");
      if (!row) return;

      const field = input.dataset.field;
      if (!field) return;

      if (row.closest("#constructionTableBody")) {
        syncConstructionField(row.dataset.id, field, input.value);
      }

      if (row.closest("#purchaseTableBody")) {
        syncPurchaseField(row.dataset.id, field, input.value);
      }

      updateTotals();
    });

    window.addEventListener("afterprint", () => {
      document.body.classList.remove("printing-mode");
    });

    document.getElementById("printButton").addEventListener("click", handlePrint);

    // JSON 원본 데이터는 스크립트 하단에 둡니다.
    // 앞으로는 이 두 배열을 기준으로 카드, 요약표, 상세표가 모두 렌더링됩니다.
    const constructionData = [
      {
        id: "construction-contract",
        label: "계약금",
        date: "2026-04-25",
        amountManwon: 300,
        route: "국민 632902-01-074940 이하종",
        status: "paid"
      },
      {
        id: "construction-middle-1",
        label: "중도금 1",
        date: "",
        amountManwon: 1000,
        route: "",
        status: "planned"
      },
      {
        id: "construction-middle-2",
        label: "중도금 2",
        date: "",
        amountManwon: 1500,
        route: "",
        status: "planned"
      },
      {
        id: "construction-balance",
        label: "잔금",
        date: "",
        amountManwon: 1800,
        route: "",
        status: "planned"
      }
    ];

    const purchaseData = [
      { id: "purchase-fridge", category: "가전", item: "냉장고", memo: "구매 예정", expectedManwon: 165, actualWon: 0, status: "planned", purchaseDate: "", paymentRoute: "" },
      { id: "purchase-kimchi-fridge", category: "가전", item: "김치냉장고", memo: "구매 예정", expectedManwon: 200, actualWon: 0, status: "planned", purchaseDate: "", paymentRoute: "" },
