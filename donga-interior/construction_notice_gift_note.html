<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>28동 901호 인테리어 공사 사전 양해 편지</title>
  <style>
    @page {
      size: A4 portrait;
      margin: 5mm;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: #111;
      background: #f4f4f4;
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif;
      line-height: 1.45;
    }

    .toolbar {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 18px;
    }

    button {
      appearance: none;
      border: 1px solid #222;
      border-radius: 4px;
      background: #fff;
      color: #111;
      padding: 8px 14px;
      font: inherit;
      cursor: pointer;
    }

    .sheet {
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto 24px;
      padding: 5mm;
      background: #fff;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 4mm;
    }

    .note {
      padding: 4mm 3.2mm;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
      break-inside: avoid;
    }

    .note p {
      margin: 0;
      font-size: 12.2pt;
      letter-spacing: 0;
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    .note p + p {
      margin-top: 3.2mm;
    }

    .from {
      text-align: right;
      font-weight: 700;
    }

    @media print {
      html,
      body {
        width: 210mm;
        height: 297mm;
        background: #fff;
      }

      .toolbar {
        display: none;
      }

      .sheet {
        width: auto;
        min-height: 0;
        height: 283mm;
        margin: 0;
        padding: 0;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button type="button" onclick="window.print()">A4 흑백 인쇄</button>
  </div>

  <main class="sheet" aria-label="A4 한 장에 20개 배치된 인테리어 공사 사전 양해 편지">
    <script>
      const message = [
        "안녕하세요, 28동 901호입니다.",
        "집 내부 인테리어 공사로 인해<br>한동안 소음과 불편을 드릴 수 있어<br>미리 양해 부탁드립니다.",
        "작은 마음으로 직접 뜬 복주머니와 수세미를 준비했습니다.<br>너그러운 이해에 감사드립니다.",
        "28동 901호 드림"
      ];

      const sheet = document.currentScript.parentElement;
      for (let index = 0; index < 9; index += 1) {
        const note = document.createElement("section");
        note.className = "note";
        note.innerHTML = `
          <p>${message[0]}</p>
          <p>${message[1]}</p>
          <p>${message[2]}</p>
          <p class="from">${message[3]}</p>
        `;
        sheet.appendChild(note);
      }
    </script>
  </main>
</body>
</html>
