<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>인테리어 예산표</title>
  <meta http-equiv="refresh" content="0; url=./donga-interior/sejong_final_budget.html" />
  <style>
    :root {
      --bg: #f4f6f8;
      --ink: #17202a;
      --muted: #64748b;
      --accent: #4f6578;
      --panel: #ffffff;
      --line: #dce5ed;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(180deg, #eef3f6 0, #f8fafb 340px, var(--bg) 100%);
      color: var(--ink);
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
    }

    .panel {
      width: min(560px, 100%);
      padding: 32px 28px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      box-shadow: 0 18px 50px rgba(23, 32, 42, 0.1);
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.15;
      font-weight: 900;
    }

    p {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }

    a {
      display: inline-block;
      margin-top: 22px;
      padding: 11px 16px;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 800;
    }

    a:hover {
      background: #43586a;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>인테리어 예산표</h1>
    <p>자동으로 예산표 화면으로 이동합니다. 이동하지 않으면 아래 버튼을 눌러 열 수 있습니다.</p>
    <a href="./donga-interior/sejong_final_budget.html">예산표 열기</a>
  </main>
</body>
</html>
