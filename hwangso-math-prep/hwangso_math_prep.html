<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>황소수학 분석 및 입학시험 준비</title>
  <style>
    :root {
      --bg: #f5f1e8;
      --panel: #fffdf8;
      --line: #d9cdb5;
      --text: #2d2418;
      --muted: #6f624e;
      --accent: #8f4b2b;
      --accent-soft: #f0ddcf;
      --ok: #2f6b4f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(143, 75, 43, 0.12), transparent 28%),
        linear-gradient(180deg, #fbf7ef 0%, var(--bg) 100%);
      color: var(--text);
    }

    main {
      width: min(1100px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    .hero,
    .panel {
      background: rgba(255, 253, 248, 0.92);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 14px 32px rgba(77, 58, 33, 0.08);
    }

    .hero {
      padding: 28px;
      margin-bottom: 20px;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h1, h2, h3 {
      margin: 0;
    }

    h1 {
      font-size: clamp(2rem, 4vw, 3.25rem);
      line-height: 1.1;
    }

    .hero p {
      margin: 14px 0 0;
      max-width: 760px;
      line-height: 1.65;
      color: var(--muted);
    }

    .summary-grid,
    .content-grid {
      display: grid;
      gap: 20px;
    }

    .summary-grid {
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      margin-bottom: 20px;
    }

    .content-grid {
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    }

    .panel {
      padding: 22px;
    }

    .label {
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 8px;
    }

    .value {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .subvalue {
      margin-top: 8px;
      color: var(--muted);
      line-height: 1.5;
    }

    .section-title {
      margin-bottom: 16px;
      font-size: 1.25rem;
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .item {
      padding: 14px 16px;
      border-radius: 16px;
      background: var(--panel);
      border: 1px solid rgba(217, 205, 181, 0.9);
    }

    .item strong {
      display: block;
      margin-bottom: 6px;
      font-size: 1rem;
    }

    .meta {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .checklist li {
      margin: 10px 0;
      line-height: 1.55;
    }

    .done {
      color: var(--ok);
      font-weight: 700;
    }

    @media (max-width: 640px) {
      main {
        width: min(100% - 20px, 1100px);
        padding-top: 20px;
      }

      .hero,
      .panel {
        border-radius: 20px;
      }
    }

    @media print {
      body {
        background: #ffffff;
      }

      .hero,
      .panel {
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <p class="eyebrow">Hwangso Math Prep</p>
      <h1>황소수학 분석 및 입학시험 준비</h1>
      <p id="hero-description"></p>
    </section>

    <section class="summary-grid" id="summary-grid"></section>

    <section class="content-grid">
      <article class="panel">
        <div class="badge">학원 분석</div>
        <h2 class="section-title" style="margin-top: 12px;">핵심 프로필</h2>
        <div class="stack" id="profile-list"></div>
      </article>

      <article class="panel">
        <div class="badge">시험 준비</div>
        <h2 class="section-title" style="margin-top: 12px;">준비 일정</h2>
        <div class="stack" id="exam-plan-list"></div>
      </article>

      <article class="panel">
        <div class="badge">학습 체크</div>
        <h2 class="section-title" style="margin-top: 12px;">체크리스트</h2>
        <ul class="checklist" id="checklist"></ul>
      </article>

      <article class="panel">
        <div class="badge">메모</div>
        <h2 class="section-title" style="margin-top: 12px;">상담 및 확인 사항</h2>
        <div class="stack" id="notes-list"></div>
      </article>
    </section>
  </main>

  <script>
    const academyProfile = {
      title: "황소수학 학원",
      description: "학원 특징과 시험 준비 정보를 한 화면에서 관리하기 위한 시작 문서입니다. 실제 확인 내용이 생기면 날짜와 출처를 함께 기록합니다.",
      location: "미정",
      targetGrade: "확인 필요",
      classStyle: "확인 필요",
      source: "초기 템플릿",
      checkedDate: "2026-04-29"
    };

    const examPlan = [
      { label: "목표", value: "황소수학 입학시험 준비 구조 만들기", note: "분석과 학습 준비를 같은 파일에서 관리" },
      { label: "시험 일정", value: "확인 필요", note: "상담 후 날짜 확정 시 업데이트" },
      { label: "준비 기간", value: "확인 필요", note: "시작일과 시험일 입력 후 계산 가능" },
      { label: "최근 확인일", value: academyProfile.checkedDate, note: academyProfile.source }
    ];

    const studyChecklist = [
      { text: "학원 위치, 대상 학년, 반 편성 방식 확인", done: false },
      { text: "입학시험 과목과 출제 범위 확인", done: false },
      { text: "기출 또는 예시 문제 확보", done: false },
      { text: "주간 학습 계획 수립", done: false },
      { text: "상담 메모와 비교 포인트 정리", done: false }
    ];

    const notesData = [
      { title: "확정 정보", body: "아직 입력되지 않음. 확인된 내용은 날짜와 출처를 함께 기록합니다." },
      { title: "추가 확인", body: "시험 난이도, 선발 기준, 반 배정 방식, 숙제량, 수업 방식 등을 우선 확인합니다." }
    ];

    const summaryCards = [
      {
        label: "최근 확인일",
        value: academyProfile.checkedDate,
        detail: "정보를 업데이트할 때마다 기준일을 함께 남깁니다."
      },
      {
        label: "시험 상태",
        value: "준비 시작",
        detail: "일정과 범위는 아직 확인 전입니다."
      },
      {
        label: "체크리스트 완료",
        value: `${studyChecklist.filter((item) => item.done).length} / ${studyChecklist.length}`,
        detail: "완료 항목 수를 기준으로 준비 상황을 봅니다."
      }
    ];

    document.getElementById("hero-description").textContent = academyProfile.description;

    document.getElementById("summary-grid").innerHTML = summaryCards.map((card) => `
      <article class="panel">
        <div class="label">${card.label}</div>
        <div class="value">${card.value}</div>
        <div class="subvalue">${card.detail}</div>
      </article>
    `).join("");

    document.getElementById("profile-list").innerHTML = [
      { title: "학원명", body: academyProfile.title },
      { title: "위치", body: academyProfile.location },
      { title: "대상 학년", body: academyProfile.targetGrade },
      { title: "수업 특징", body: academyProfile.classStyle },
      { title: "출처", body: `${academyProfile.source} / ${academyProfile.checkedDate}` }
    ].map((item) => `
      <div class="item">
        <strong>${item.title}</strong>
        <div class="meta">${item.body}</div>
      </div>
    `).join("");

    document.getElementById("exam-plan-list").innerHTML = examPlan.map((item) => `
      <div class="item">
        <strong>${item.label}</strong>
        <div class="meta">${item.value}</div>
        <div class="meta">${item.note}</div>
      </div>
    `).join("");

    document.getElementById("checklist").innerHTML = studyChecklist.map((item) => `
      <li>
        <span class="${item.done ? "done" : ""}">${item.done ? "완료" : "대기"}</span>
        ${item.text}
      </li>
    `).join("");

    document.getElementById("notes-list").innerHTML = notesData.map((note) => `
      <div class="item">
        <strong>${note.title}</strong>
        <div class="meta">${note.body}</div>
      </div>
    `).join("");
  </script>
</body>
</html>
