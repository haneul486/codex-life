<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>황소수학 분석 및 입학시험 준비</title>
  <style>
    :root {
      --bg: #f5f1e8;
      --panel: rgba(255, 253, 248, 0.95);
      --line: #d9cdb5;
      --text: #2d2418;
      --muted: #6f624e;
      --accent: #8f4b2b;
      --accent-soft: #f0ddcf;
      --ok: #2f6b4f;
      --warn: #b06a24;
      --shadow: rgba(77, 58, 33, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(143, 75, 43, 0.12), transparent 28%),
        linear-gradient(180deg, #fbf7ef 0%, var(--bg) 100%);
      color: var(--text);
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    .hero,
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 14px 32px var(--shadow);
    }

    .hero {
      padding: 28px;
      margin-bottom: 20px;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h1, h2, h3 {
      margin: 0;
    }

    h1 {
      font-size: clamp(2rem, 4vw, 3.25rem);
      line-height: 1.1;
    }

    .hero p {
      margin: 14px 0 0;
      max-width: 780px;
      line-height: 1.7;
      color: var(--muted);
    }

    .summary-grid,
    .content-grid,
    .wide-grid {
      display: grid;
      gap: 20px;
    }

    .summary-grid {
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      margin-bottom: 20px;
    }

    .content-grid {
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    }

    .wide-grid {
      grid-template-columns: 1.3fr 0.9fr;
      margin-top: 20px;
    }

    .panel {
      padding: 22px;
    }

    .label {
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 8px;
    }

    .value {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .subvalue {
      margin-top: 8px;
      color: var(--muted);
      line-height: 1.5;
    }

    .section-title {
      margin-top: 12px;
      margin-bottom: 16px;
      font-size: 1.3rem;
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .item {
      padding: 14px 16px;
      border-radius: 16px;
      background: #fffdfa;
      border: 1px solid rgba(217, 205, 181, 0.9);
    }

    .item strong {
      display: block;
      margin-bottom: 6px;
      font-size: 1rem;
    }

    .meta {
      color: var(--muted);
      font-size: 0.93rem;
      line-height: 1.55;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .checklist {
      padding-left: 18px;
      margin: 0;
    }

    .checklist li {
      margin: 10px 0;
      line-height: 1.6;
    }

    .done {
      color: var(--ok);
      font-weight: 700;
    }

    .schedule-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      overflow: hidden;
      border-radius: 18px;
      border: 1px solid var(--line);
    }

    .schedule-table th,
    .schedule-table td {
      padding: 14px 12px;
      text-align: left;
      vertical-align: top;
      border-bottom: 1px solid rgba(217, 205, 181, 0.65);
      line-height: 1.55;
      font-size: 0.95rem;
    }

    .schedule-table th {
      background: #f7efe3;
      color: var(--text);
      font-size: 0.88rem;
    }

    .schedule-table tr:last-child td {
      border-bottom: none;
    }

    .phase {
      display: inline-flex;
      align-items: center;
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(143, 75, 43, 0.11);
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .resource-link {
      display: block;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(217, 205, 181, 0.9);
      background: #fffdfa;
      color: inherit;
      text-decoration: none;
    }

    .resource-link:hover {
      border-color: var(--accent);
      box-shadow: 0 8px 18px rgba(143, 75, 43, 0.1);
    }

    .resource-state {
      color: var(--warn);
      font-weight: 700;
      font-size: 0.88rem;
      margin-bottom: 6px;
    }

    .note-box {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 16px;
      background: #f8f1e8;
      border: 1px dashed var(--line);
      color: var(--muted);
      line-height: 1.6;
      font-size: 0.94rem;
    }

    @media (max-width: 900px) {
      .wide-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      main {
        width: min(100% - 20px, 1120px);
        padding-top: 20px;
      }

      .hero,
      .panel {
        border-radius: 20px;
      }

      .schedule-table {
        display: block;
        overflow-x: auto;
      }
    }

    @media print {
      body {
        background: #ffffff;
      }

      .hero,
      .panel {
        box-shadow: none;
      }

      .resource-link {
        break-inside: avoid;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <p class="eyebrow">Hwangso Math Prep</p>
      <h1>황소수학 분석 및 입학시험 준비</h1>
      <p id="hero-description"></p>
    </section>

    <section class="summary-grid" id="summary-grid"></section>

    <section class="wide-grid">
      <article class="panel">
        <div class="badge">시험 준비 일정표</div>
        <h2 class="section-title">5월 23일까지 준비 흐름</h2>
        <table class="schedule-table">
          <thead>
            <tr>
              <th>기간</th>
              <th>단계</th>
              <th>핵심 목표</th>
              <th>해야 할 일</th>
            </tr>
          </thead>
          <tbody id="schedule-body"></tbody>
        </table>
        <div class="note-box">
          현재 일정표는 `진단 → 약점 보정 → 실전 운영` 흐름을 기준으로 잡았습니다.
          다음 단계에서는 진단 시험지를 만든 뒤 결과를 여기에 다시 연결합니다.
        </div>
      </article>

      <article class="panel">
        <div class="badge">시험 자료</div>
        <h2 class="section-title">항상 열어볼 자료</h2>
        <div class="stack" id="resource-links"></div>
      </article>
    </section>

    <section class="content-grid" style="margin-top: 20px;">
      <article class="panel">
        <div class="badge">학원 분석</div>
        <h2 class="section-title">핵심 프로필</h2>
        <div class="stack" id="profile-list"></div>
      </article>

      <article class="panel">
        <div class="badge">준비 원칙</div>
        <h2 class="section-title">현재 준비 방향</h2>
        <div class="stack" id="exam-plan-list"></div>
      </article>

      <article class="panel">
        <div class="badge">학습 체크</div>
        <h2 class="section-title">체크리스트</h2>
        <ul class="checklist" id="checklist"></ul>
      </article>

      <article class="panel">
        <div class="badge">메모</div>
        <h2 class="section-title">상담 및 확인 사항</h2>
        <div class="stack" id="notes-list"></div>
      </article>
    </section>
  </main>

  <script>
    const examDate = "2026-05-23";

    const academyProfile = {

      location: "확인 필요",

      source: "황소 준비 기준 문서",
      checkedDate: "2026-04-29"

    const examPlan = [
      { label: "시험일", value: examDate, note: "현재 기준 목표일" },

      { label: "준비 방식", value: "현재 수준 평가 후 주간 보정", note: "점수보다 약점 유형과 HBI 수준을 먼저 기록" },
      { label: "핵심 단계", value: "진단 → 약점 보정 → 실전 운영", note: "시험 전 마지막 주는 시간 안배와 검산 연습" }
    ];

    const scheduleData = [
      {
        period: "4/29~5/2",
        phase: "진단 준비",
        goal: "현재 수준 평가 틀 만들기",
        tasks: [
          "초4-1 단원을 큰 수, 곱셈/나눗셈, 각도, 평면도형, 규칙 찾기처럼 진단용 항목으로 나눈다.",
          "HBI 기준으로 어떤 문제가 약한지 기록할 수 있게 평가표 구조를 잡는다.",
          "인쇄 가능한 현재 수준 진단 시험지 폴더를 준비한다."
        ]
      },
      {
        period: "5/3~5/7",
        phase: "1차 진단",
        goal: "현재 실력을 수치보다 약점 유형으로 파악",
        tasks: [
          "진단 시험지를 실제 시험처럼 풀어 본다.",
          "오답을 단원별보다 약점 태그별로 정리한다.",

        ]

      {

        goal: "약한 유형 집중 보완",
        tasks: [
          "계산 정확도, 조건 해석, 표현 전환 약점을 나눠 보완한다.",
          "단원별로 쉬운 문제보다 황소형 문제 2~4개를 정확히 복기한다.",
          "틀린 문제는 다시 풀고 한 줄 풀이 전략을 남긴다."
        ]
      },
      {
        period: "5/15~5/19",
        phase: "실전 강화",
        goal: "HBI-4 중심 세트 적응",
        tasks: [
          "시간을 재고 문제를 푸는 연습을 시작한다.",
          "막히는 문제를 넘기고 돌아오는 운영 연습을 한다.",

      },
      {

        phase: "최종 점검",
        goal: "실수 줄이기와 컨디션 유지",
        tasks: [
          "새로운 어려운 문제보다 자주 틀린 유형을 다시 점검한다.",
          "검산 순서와 문제 선택 순서를 고정한다.",
          "전날에는 긴 학습보다 가벼운 복습과 리듬 유지에 집중한다."
        ]
      },
      {
        period: "5/23",
        phase: "시험일",
        goal: "운영 실수 없이 끝까지 풀기",
        tasks: [
          "쉬운 문제부터 안정적으로 점수를 확보한다.",
          "막히는 문제는 표시하고 넘어간 뒤 다시 본다.",
          "마지막에는 계산 실수와 조건 누락을 빠르게 점검한다."
        ]
      }
    ];

    const studyChecklist = [
      { text: "현재 수준 진단 시험지 만들기", done: true },
      { text: "제출본 사진 업로드 및 평가 폴더 연결", done: true },
      { text: "1차 진단 후 HBI 수준 기록", done: true },
      { text: "제출 사진 기준 채점 결과 리뷰 작성", done: true },
      { text: "약점 유형별 보정 문제 세트 연결", done: true },
      { text: "실전판 1 세트 만들기", done: true },
      { text: "초4-1 단원별 핵심 개념과 약점 태그 정리", done: false },
      { text: "실전 운영용 모의 세트와 검산 루틴 만들기", done: false }
    ];

    const resourceLinks = [
      {
        title: "현재 수준 평가표",
        state: "생성 완료",
        body: "초4-1 범위 기준 1차 진단 시험지입니다. 인쇄해서 실제 시험처럼 풀어보고, 이후 HBI 수준과 약점 태그를 기록합니다.",
        href: "./current-level-assessment/current_level_assessment.html"
      },
      {
        title: "정답 및 채점표",
        state: "생성 완료",
        body: "현재 수준 평가표의 문항별 정답, 채점 기준, 빠른 해석 기준을 담은 문서입니다.",
        href: "./current-level-assessment/current_level_assessment_answer.html"
      },
      {
        title: "HBI 판정표",
        state: "생성 완료",
        body: "실제 제출 사진 기준으로 채점 결과, 문항별 판정, 약점 태그, 사진 위 맞음/틀림 표시까지 정리한 결과 리뷰 문서입니다.",
        href: "./current-level-assessment/current_level_hbi_review.html"
      },
      {
        title: "1차 모의 세트",
        state: "생성 완료",
        body: "현재 수준 평가 후 바로 이어서 푸는 첫 실전형 세트입니다. 시간 운영과 HBI-4 적응에 초점을 둡니다.",
        href: "./mock-set-1/mock_set_1.html"
      },
      {
        title: "실전판 1",
        state: "생성 완료",
        body: "내일 풀어볼 비교용 실전판입니다. 현재 수준 평가표보다 더 황소답게, HBI-4~HBI-5 중심으로 구성했습니다.",
        href: "./real-set-1/real_set_1.html"
      },
      {
        title: "오답 점검표",
        state: "다음 작업",

        href: "#"
      }
    ];

    const notesData = [
      { title: "진행 완료", body: "메인 준비 페이지, 현재 수준 평가표, 정답 및 채점표, HBI 결과 리뷰, 1차 모의 세트, 실전판 1까지 연결했습니다. 제출 사진 7장도 평가 폴더에 보관하고 결과 리뷰 페이지에서 문항별 맞음·틀림 표시와 함께 다시 볼 수 있게 정리했습니다." },
      { title: "현재 준비 해석", body: "1차 평가 결과는 8/12이고, 현재 판정은 HBI-3 안정 · HBI-4 진입 단계입니다. 계산력보다 조건 해석, 문항 요구 분리, 표현 전환 보강이 우선입니다." },

    const summaryCards = [
      {
        label: "시험일",
        value: examDate,
        detail: "입학시험 기준일"
      },
      {
        label: "현재 준비 범위",
        value: "초4-1",
        detail: "대한민국 초등학교 4학년 1학기 수학"
      },
      {
        label: "기본 목표 수준",
        value: "HBI-4",
        detail: "황소 입학시험 표준 구간 적응"

      {
        label: "현재 판정",

    document.getElementById("hero-description").textContent = academyProfile.description;

    document.getElementById("summary-grid").innerHTML = summaryCards.map((card) => `
      <article class="panel">
        <div class="label">${card.label}</div>
        <div class="value">${card.value}</div>
        <div class="subvalue">${card.detail}</div>
      </article>
    `).join("");

    document.getElementById("schedule-body").innerHTML = scheduleData.map((item) => `

        <td><strong>${item.period}</strong></td>
        <td><span class="phase">${item.phase}</span><div>${item.goal}</div></td>

        <td>${item.tasks.map((task) => `- ${task}`).join("<br>")}</td>

    `).join("");

    document.getElementById("resource-links").innerHTML = resourceLinks.map((item) => `
      <a class="resource-link" href="${item.href}">
        <div class="resource-state">${item.state}</div>
        <strong>${item.title}</strong>
        <div class="meta">${item.body}</div>
      </a>
    `).join("");

    document.getElementById("profile-list").innerHTML = [
      { title: "학원명", body: academyProfile.title },
      { title: "현재 준비 범위", body: academyProfile.targetGrade },
      { title: "준비 초점", body: academyProfile.classStyle },
      { title: "최근 기준일", body: academyProfile.checkedDate },
      { title: "출처", body: academyProfile.source }
    ].map((item) => `
      <div class="item">
        <strong>${item.title}</strong>
        <div class="meta">${item.body}</div>
      </div>
    `).join("");

    document.getElementById("exam-plan-list").innerHTML = examPlan.map((item) => `
      <div class="item">
        <strong>${item.label}</strong>
        <div class="meta">${item.value}</div>
        <div class="meta">${item.note}</div>
      </div>
    `).join("");

    document.getElementById("checklist").innerHTML = studyChecklist.map((item) => `
      <li>
        <span class="${item.done ? "done" : ""}">${item.done ? "완료" : "대기"}</span>
        ${item.text}
      </li>
    `).join("");

    document.getElementById("notes-list").innerHTML = notesData.map((note) => `
      <div class="item">
        <strong>${note.title}</strong>
        <div class="meta">${note.body}</div>
      </div>
    `).join("");
  </script>
</body>
</html>
